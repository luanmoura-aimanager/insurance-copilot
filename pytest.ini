[pytest]
asyncio_mode = auto
# The engine fixture is session-scoped, so its asyncpg connection pool binds to a
# single event loop. Run every test and async fixture on that same session-scoped
# loop; otherwise function-scoped tests each spawn a fresh loop and reusing a pooled
# connection raises "Event loop is closed".
asyncio_default_test_loop_scope = session
asyncio_default_fixture_loop_scope = session
